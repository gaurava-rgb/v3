<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="15">
<title>Updating — RideSplit</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#fafafa; color:#1a1a1a; min-height:100vh;
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .card {
    background:#fff; border:1px solid #e8e8e8; border-radius:16px;
    padding:40px 32px; max-width:420px; width:100%; text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.04);
  }
  .logo {
    font-size:18px; font-weight:700; color:#500000;
    letter-spacing:-0.3px; margin-bottom:24px;
  }
  .spinner {
    width:48px; height:48px; margin:0 auto 24px;
    border:3px solid #f2f2f7; border-top-color:#500000;
    border-radius:50%; animation:spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  h1 {
    font-size:20px; font-weight:700; margin-bottom:8px;
    letter-spacing:-0.3px;
  }
  p { font-size:14px; color:#666; line-height:1.5; margin-bottom:16px; }
  .hint { font-size:12px; color:#999; }
  .retry {
    display:inline-block; margin-top:8px; padding:10px 20px;
    background:#500000; color:#fff; border-radius:8px;
    font-size:13px; font-weight:600; text-decoration:none;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">ridesplit.app</div>
    <div class="spinner"></div>
    <h1>Quick update in progress</h1>
    <p>We're deploying a new version. Back online in a few seconds.</p>
    <a class="retry" href="/">Try again</a>
    <p class="hint" style="margin-top:20px;">This page auto-refreshes every 15s.</p>
  </div>
</body>
</html>
